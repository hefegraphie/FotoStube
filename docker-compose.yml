version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hefe
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fotostube
    volumes:
      - pgdata:/var/lib/postgresql/data
    # NEU: Docker testet alle 5 Sekunden, ob die DB ansprechbar ist
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hefe -d fotostube"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        # NEU: Die App startet erst, wenn der Healthcheck oben "gesund" meldet
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://hefe:super_secret_password@db:5432/fotostube
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=hier_ein_langes_zufaelliges_geheimnis_eintragen
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
